name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ devopslearnnits }}
          password: ${{ Nits@1280 }}

      - name: Build Docker Image
        run: docker build -t devopslearnnits/my-node-app .

      - name: Push Docker Image
        run: docker push devopslearnnits/my-node-app

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu
            docker pull devopslearnnits/my-node-app
            docker-compose down
            docker-compose up -d
